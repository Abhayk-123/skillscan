version: "3.9"

services:
  api:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - skillscan_data:/app/data
    environment:
      DATABASE_PATH: /app/data/skillscan.db

  web:
    build:
      context: ./client
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  skillscan_data:
